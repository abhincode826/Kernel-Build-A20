name: Build A20 Kernel + KernelSU-Next

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/abhincode826/Eureka-Kernel
  KERNEL_BRANCH: R15-OneUI
  KERNEL_DEFCONFIG: exynos7885-a20_defconfig
  DEVICE_NAME: A20
  ARCH: arm64
  KSU_MANAGER_SIZE: "0x3e6"
  KSU_MANAGER_HASH: "5bf844d1431127dbb76042e9341de19216fdd7d394c01b3c96cc21216c8c69a5"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential ccache flex git \
            libncurses5-dev libssl-dev python3 zip curl \
            clang-15 lld-15 llvm-15 binutils-aarch64-linux-gnu
          sudo ln -sf /usr/bin/clang-15        /usr/local/bin/clang
          sudo ln -sf /usr/bin/ld.lld-15       /usr/local/bin/ld.lld
          sudo ln -sf /usr/bin/llvm-ar-15      /usr/local/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-15      /usr/local/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-15 /usr/local/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-15 /usr/local/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-15   /usr/local/bin/llvm-strip

      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      - name: Checkout kernel source
        run: |
          git clone --depth=1 \
            --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      - name: Resolve KernelSU-Next version
        working-directory: kernel
        run: |
          if [ -f "drivers/kernelsu/.ksu_version" ]; then
            KSU_VER=$(cat drivers/kernelsu/.ksu_version)
          else
            KSU_VER="legacy"
          fi
          echo "KSU_VER=${KSU_VER}" >> $GITHUB_ENV
          echo "KernelSU-Next version: ${KSU_VER}"

      - name: Generate defconfig
        working-directory: kernel
        run: |
          make ARCH=${{ env.ARCH }} \
            CC=clang-15 LD=ld.lld-15 AR=llvm-ar-15 NM=llvm-nm-15 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            ${{ env.KERNEL_DEFCONFIG }} -j$(nproc)

      - name: Verify KSU config
              working-directory: kernel
              run: |
                grep "CONFIG_KSU" .config
                
      - name: Build kernel
        working-directory: kernel
        run: |
          make ARCH=${{ env.ARCH }} \
            CC=clang-15 LD=ld.lld-15 AR=llvm-ar-15 NM=llvm-nm-15 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KCFLAGS="-Wno-error" \
            KSU_NEXT_MANAGER_SIZE=${{ env.KSU_MANAGER_SIZE }} \
            KSU_NEXT_MANAGER_HASH=${{ env.KSU_MANAGER_HASH }} \
            Image dtb.img \
            -j$(nproc) 2>&1 | tee build.log
          [ -f arch/arm64/boot/Image ] || \
            { echo "::error::Image not found - build failed"; grep -i "error:" build.log | tail -30; exit 1; }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/build.log
          if-no-files-found: ignore

      - name: Package flashable zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp workflow-repo/AnyKernel13/anykernel.sh AK3/anykernel.sh
          cp kernel/arch/arm64/boot/Image AK3/
          [ -f kernel/arch/arm64/boot/dtb.img ] && cp kernel/arch/arm64/boot/dtb.img AK3/
          KERNEL_VER=$(grep UTS_RELEASE kernel/include/generated/utsrelease.h \
            | cut -d'"' -f2 | sed 's/+*$//')
          BUILD_NUM=${{ github.run_number }}
          ZIP_NAME="${{ env.DEVICE_NAME }}_${KERNEL_VER}-KSUN-${{ env.KSU_VER }}_b${BUILD_NUM}.zip"
          echo "KERNEL_VER=${KERNEL_VER}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          cd AK3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.md"
          cd ..
          echo "Built: ${ZIP_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "${{ env.DEVICE_NAME }} Kernel | KSU ${{ env.KSU_VER }} | #${{ github.run_number }}"
          body: |
            ## ${{ env.DEVICE_NAME }} Kernel Build #${{ github.run_number }}
            - KernelSU-Next: ${{ env.KSU_VER }}
            - Kernel: ${{ env.KERNEL_VER }}
            - Defconfig: ${{ env.KERNEL_DEFCONFIG }}
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send build to Telegram
        if: success() && vars.TG_ENABLED == 'true'
        run: |
          curl -sf \
            -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -F "document=@${{ env.ZIP_NAME }}" \
            -F "caption=Build ${{ github.run_number }} done" \
            "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            || echo "::warning::Telegram upload failed"
