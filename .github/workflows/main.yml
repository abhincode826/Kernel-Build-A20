name: Build A20 Kernel + KernelSU-Next

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/abhincode826/Eureka-Kernel
  KERNEL_BRANCH: R15-OneUI
  KERNEL_DEFCONFIG: exynos7885-a20_defconfig
  DEVICE_NAME: A20
  ARCH: arm64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential flex git \
            libncurses5-dev libssl-dev python3 zip curl cpio \
            gcc-aarch64-linux-gnu

      - name: Setup Neutron Clang toolchain
        run: |
          mkdir -p toolchain
          cd toolchain
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") -S=10032024
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") --patch=glibc
          cd ..
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH

      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      - name: Checkout kernel source
        run: |
          git clone --depth=1 \
            --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      - name: Setup KernelSU-Next
        working-directory: kernel
        run: |
          echo "KSU_VER=v1.1.1" >> $GITHUB_ENV
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s v1.1.1
          sed -i 's/KSU_NEXT_MANAGER_HASH := 79e590113c4c4c0c222978e413a5faa801666957b1212a328e46c00c69821bf7/KSU_NEXT_MANAGER_HASH := 988dae93c17b5477b8b97952cc5bca6809a386bbbba55940ce45aecc90cacb80/' drivers/kernelsu/Kbuild
          grep "MANAGER_HASH" drivers/kernelsu/Kbuild
          sed -i 's/module_init(kernelsu_init)/late_initcall(kernelsu_init)/' drivers/kernelsu/ksu.c
          python3 ../workflow-repo/debug_patch.py
          sed -i "s/-Eureka-KSUNext-Test/-Eureka-KSUNext-b${{ github.run_number }}/" arch/arm64/configs/exynos7885-a20_defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "# CONFIG_KPROBES is not set" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "# CONFIG_HAVE_KPROBES is not set" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "CONFIG_LTO_NONE=y" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "# CONFIG_LTO_CLANG is not set" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "# CONFIG_THINLTO is not set" >> arch/arm64/configs/exynos7885-a20_defconfig
          echo "=== [DIAG-PATCH] ksu.c lines 32-40 after patch ==="
          sed -n '32,101p' drivers/kernelsu/ksu.c
          echo "=== [DIAG-1] KSU init call ==="
          grep -n "module_init\|late_initcall\|kernelsu_init" drivers/kernelsu/ksu.c
          echo "=== [DIAG-2] VFS hooks present ==="
          grep -l "ksu_handle" fs/exec.c fs/open.c fs/read_write.c fs/stat.c kernel/reboot.c || echo "MISSING VFS HOOKS"
          echo "=== [DIAG-3] KSU files present ==="
          ls drivers/kernelsu/
          echo "=== [DIAG-4] drivers/Makefile has kernelsu ==="
          grep -i "kernelsu" drivers/Makefile || echo "MISSING FROM drivers/Makefile"
          echo "=== [DIAG-5] drivers/Kconfig has kernelsu ==="
          grep -i "kernelsu" drivers/Kconfig || echo "MISSING FROM drivers/Kconfig"
          echo "=== [DIAG-KOBJ] who creates ksu sysfs ==="
          grep -rn "kobject_create\|ksu_kobj\|kernel_kobj" drivers/kernelsu/ | grep -v "\.o:"
          echo "=== [DIAG-DEV] who creates /dev/ksu ==="
          grep -rn "misc_register" drivers/kernelsu/ || true
          echo "=== [DIAG-IOCTL] how kernel exposes interface ==="
          echo "=== [DIAG-HOOK] faccessat hook logic ==="
          grep -n "faccessat\|magic\|version\|KSU_VERSION\|uid\|root" drivers/kernelsu/ksu.c || true
          echo "=== [DIAG-SUCOMPAT] sucompat hook ==="
          grep -n "faccessat\|magic\|version" drivers/kernelsu/sucompat.c || true
          grep -rn "ioctl\|KSU_DEV\|dev/ksu" drivers/kernelsu/ || true
          echo "=== [DIAG-SUCOMPAT-FULL] ==="
          sed -n '80,130p' drivers/kernelsu/sucompat.c || true
          echo "=== [DIAG-KSU-FULL] ksu.c full ==="
          cat drivers/kernelsu/ksu.c || true
          echo "=== [DIAG-SUPERCALLS-INIT] ==="
          grep -n "ksu_supercalls_init\|kobject\|ksu_kobj\|sys/kernel/ksu" drivers/kernelsu/supercalls.c || true
          echo "=== [DIAG-SUPERCALLS-FULL] ==="
          sed -n '1003,1030p' drivers/kernelsu/supercalls.c || true
          echo "=== [DIAG-KSUD-INIT] ==="
          grep -n "ksu_ksud_init\|manager\|uid\|install_fd" drivers/kernelsu/ksud.c | head -30 || true
          echo "=== [DIAG-KSUD-FULL] ==="
          sed -n '773,820p' drivers/kernelsu/ksud.c || true
          
      - name: Debug defconfig
        working-directory: kernel
        run: |
           echo "=== [DIAG-6] KSU entries in defconfig ==="
           grep -i "KSU\|LTO" arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }} || echo "NONE"
          
      - name: Generate defconfig
        working-directory: kernel
        run: |
          mkdir -p out
          make O=out ARCH=${{ env.ARCH }} \
          CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          ${{ env.KERNEL_DEFCONFIG }} -j$(nproc)
          
      - name: Enable KernelSU in defconfig
        working-directory: kernel
        run: |
         echo "=== [DIAG-7] Config after our changes (before build) ==="
         grep -E "CONFIG_KSU|CONFIG_LTO|CONFIG_THINLTO|CONFIG_KPROBES" out/.config || echo "NONE FOUND"
          
      - name: Build kernel
        working-directory: kernel
        run: |
          make O=out ARCH=${{ env.ARCH }} \
          CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          KCFLAGS="-Wno-error" \
          Image dtb.img \
          -j$(nproc) 2>&1 | tee out/build.log
          [ -f out/arch/arm64/boot/Image ] || \
          { echo "::error::Image not found - build failed"; grep -i "error:" out/build.log | tail -30; exit 1; }
          
      - name: Verify KSU survived build
        working-directory: kernel
        run: |
          echo "=== [DIAG-8] Config after build (silentoldconfig may have stripped) ==="
          grep -E "CONFIG_KSU|CONFIG_LTO|CONFIG_THINLTO|CONFIG_KPROBES" out/.config || echo "NONE FOUND"
          echo "=== [DIAG-9] KSU symbols in vmlinux ==="
          nm out/vmlinux 2>/dev/null | grep -i "kernelsu\|ksu_handle" || echo "KSU SYMBOLS MISSING FROM VMLINUX"
          echo "=== [DIAG-10] KSU strings in Image ==="
          strings out/arch/arm64/boot/Image | grep -i "kernelsu\|KernelSU" || echo "KSU STRINGS MISSING FROM IMAGE"
          echo "=== [DIAG-11] late_initcall section in vmlinux ==="
          nm out/vmlinux 2>/dev/null | grep "__initcall.*kernelsu\|initcall7.*kernelsu" || echo "KSU NOT IN INITCALL SECTION"
                
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: kernel/out/build.log
          if-no-files-found: ignore

      - name: Package flashable zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp workflow-repo/AnyKernel13/anykernel.sh AK3/anykernel.sh
          cp kernel/out/arch/arm64/boot/Image AK3/
          [ -f kernel/out/arch/arm64/boot/dtb.img ] && cp kernel/out/arch/arm64/boot/dtb.img AK3/
          KERNEL_VER=$(grep UTS_RELEASE kernel/out/include/generated/utsrelease.h \
            | cut -d'"' -f2 | sed 's/+*$//')
          BUILD_NUM=${{ github.run_number }}
          ZIP_NAME="Eureka-KSU-b${BUILD_NUM}.zip"
          echo "KERNEL_VER=${KERNEL_VER}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          cd AK3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.md"
          cd ..
          echo "Built: ${ZIP_NAME}"

      - name: Create GitHub Release
        if: false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "${{ env.DEVICE_NAME }} Kernel | KSU ${{ env.KSU_VER }} | #${{ github.run_number }}"
          body: |
            ## ${{ env.DEVICE_NAME }} Kernel Build #${{ github.run_number }}
            - KernelSU-Next: ${{ env.KSU_VER }}
            - Kernel: ${{ env.KERNEL_VER }}
            - Defconfig: ${{ env.KERNEL_DEFCONFIG }}
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send build to Telegram
        if: success() && vars.TG_ENABLED == 'true'
        run: |
          curl -sf \
            -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -F "document=@${{ env.ZIP_NAME }}" \
            -F "caption=Build ${{ github.run_number }} done" \
            "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            || echo "::warning::Telegram upload failed"
