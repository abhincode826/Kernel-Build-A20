name: Build A20 Kernel + KernelSU-Next

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'

env:
  # ── Kernel source ────────────────────────────────────────────────────────────
  KERNEL_SOURCE: https://github.com/YOUR_USERNAME/eureka-kernel
  KERNEL_BRANCH: R15-OneUI
  KERNEL_DEFCONFIG: exynos7885-a20_defconfig
  # ── Device / packaging ───────────────────────────────────────────────────────
  DEVICE_NAME: A20
  ARCH: arm64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

      # ── 1. Host dependencies ────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential ccache flex git \
            libncurses5-dev libssl-dev python3 zip curl \
            clang-15 lld-15 llvm-15 binutils-aarch64-linux-gnu

      # ── 2. Checkout this repo (AnyKernel3, configs) ─────────────────────────
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          path: workflow-repo

      # ── 3. Checkout patched kernel source ───────────────────────────────────
      - name: Checkout kernel source
        run: |
          git clone --depth=1 \
            --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      # ── 4. Resolve KernelSU-Next version from kernel source ─────────────────
      - name: Resolve KernelSU-Next version
        working-directory: kernel
        run: |
          if [ -f "drivers/kernelsu/.ksu_version" ]; then
            KSU_VER=$(cat drivers/kernelsu/.ksu_version)
          elif [ -d "KernelSU-Next" ]; then
            KSU_VER=$(git -C KernelSU-Next describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          else
            KSU_VER="legacy"
          fi
          echo "KSU_VER=${KSU_VER}" >> $GITHUB_ENV
          echo "KernelSU-Next version: ${KSU_VER}"

      # ── 5. Build defconfig ───────────────────────────────────────────────────
      - name: Generate defconfig
        working-directory: kernel
        run: |
          make ARCH=${{ env.ARCH }} \
            CC=clang-15 LD=ld.lld-15 AR=llvm-ar-15 NM=llvm-nm-15 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            ${{ env.KERNEL_DEFCONFIG }} -j$(nproc)

      # ── 6. Build kernel Image + DTB ─────────────────────────────────────────
      - name: Build kernel
        working-directory: kernel
        run: |
          make ARCH=${{ env.ARCH }} \
            CC=clang-15 LD=ld.lld-15 AR=llvm-ar-15 NM=llvm-nm-15 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KCFLAGS="-Wno-error" \
            Image dtb.img \
            -j$(nproc) 2>&1 | tee build.log
          
          [ -f arch/arm64/boot/Image ] || \
            { echo "::error::Image not found — build failed"; grep -i "error:" build.log | tail -20; exit 1; }

      # ── 7. Package with AnyKernel3 ──────────────────────────────────────────
      - name: Package flashable zip
        run: |
          cp -r workflow-repo/AnyKernel3 AK3

          cp kernel/arch/arm64/boot/Image AK3/
          [ -f kernel/arch/arm64/boot/dtb.img ] && cp kernel/arch/arm64/boot/dtb.img AK3/

          KERNEL_VER=$(grep UTS_RELEASE kernel/include/generated/utsrelease.h \
            | cut -d'"' -f2 | sed 's/+*$//')
          BUILD_NUM=${{ github.run_number }}
          ZIP_NAME="${{ env.DEVICE_NAME }}_${KERNEL_VER}-KSUN-${KSU_VER}_b${BUILD_NUM}.zip"

          echo "KERNEL_VER=${KERNEL_VER}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}"     >> $GITHUB_ENV

          cd AK3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.md"
          cd ..
          echo "Built: ${ZIP_NAME} ($(du -sh ${ZIP_NAME} | cut -f1))"

      # ── 8. Tag + upload to GitHub Releases ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "${{ env.DEVICE_NAME }} Kernel | KSU ${{ env.KSU_VER }} | #${{ github.run_number }}"
          body: |
            ## ${{ env.DEVICE_NAME }} Kernel — Build #${{ github.run_number }}
            
            - **KernelSU-Next:** `${{ env.KSU_VER }}`
            - **Kernel version:** `${{ env.KERNEL_VER }}`
            - **Source commit:** `${{ github.sha }}`
            - **Defconfig:** `${{ env.KERNEL_DEFCONFIG }}`
            
            Flash in TWRP or any AnyKernel3-compatible recovery.
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Send to Telegram ─────────────────────────────────────────────────
      - name: Send build to Telegram
        if: success() && vars.TG_ENABLED == 'true'
        run: |
          CAPTION="✅ *${{ env.DEVICE_NAME }} Kernel Build #${{ github.run_number }}*%0A"
          CAPTION+="KSU-Next: \`${{ env.KSU_VER }}\`%0A"
          CAPTION+="Kernel: \`${{ env.KERNEL_VER }}\`%0A"
          CAPTION+="Commit: \`$(echo ${{ github.sha }} | head -c 8)\`"

          curl -sf \
            -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -F "document=@${{ env.ZIP_NAME }}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=Markdown" \
            "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            || echo "::warning::Telegram upload failed (non-fatal)"
